# Career-Ops Profile Configuration
# Copy this file to config/profile.yml and fill in your details.
# This is the single source of truth for your personal data across all modes.

candidate:
  full_name: "Jane Smith"
  email: "jane@example.com"
  phone: "+1-555-0123"
  location: "San Francisco, CA"
  linkedin: "linkedin.com/in/janesmith"
  portfolio_url: "https://janesmith.dev"
  github: "github.com/janesmith"
  twitter: "https://x.com/janesmith"

target_roles:
  # Your North Star roles — what you're optimizing for.
  primary:
    - "Senior AI Engineer"
    - "Staff ML Engineer"

  # Archetypes drive two surfaces:
  #   1. scan.mjs reads `semantic_description` per archetype and hands it to
  #      the title-filter LLM (scan-semantic.mjs) to recover neutral titles
  #      that don't hit a literal positive/negative keyword.
  #   2. The agent reads this whole block at evaluation time as Block B
  #      "North Star alignment" context — `name`, `level`, and `fit` shape
  #      how strongly each archetype scores in reports.
  # Per-archetype scoring narrative (proof points, framing) lives in
  # `modes/_profile.md`, keyed by archetype name.
  #
  # `semantic_description` is optional — leave it off and scan.mjs falls
  # back to broader keyword matching for that archetype.
  archetypes:
    - name: "AI/ML Engineer"
      level: "Senior/Staff"
      fit: "primary"        # primary = dream role, secondary = good fit, adjacent = stretch
      semantic_description: "Senior or Staff AI/ML engineer building production model pipelines (training, eval, serving)"
    - name: "AI Product Manager"
      level: "Senior"
      fit: "secondary"
      semantic_description: "Senior product manager owning an AI product surface (LLM features, agentic flows, model-driven UX)"
    - name: "Solutions Architect"
      level: "Mid-Senior"
      fit: "adjacent"
      semantic_description: "Solutions architect — pre-sales or post-sales senior IC, technical role"

narrative:
  # Your professional headline (1 line)
  headline: "ML Engineer turned AI product builder"
  # Your exit story — what makes you unique
  exit_story: "Built and sold my SaaS after 5 years. Now focused on applied AI at scale."
  # Your top 3-5 superpowers
  superpowers:
    - "End-to-end ML pipelines"
    - "Fast prototyping (idea to prod in 2 weeks)"
    - "Cross-functional communication"
  # Proof points — projects, articles, case studies with measurable impact
  proof_points:
    - name: "Project Alpha"
      url: "https://janesmith.dev/project-alpha"
      hero_metric: "Reduced inference latency 40%"
    - name: "Open Source Tool"
      url: "https://github.com/janesmith/tool"
      hero_metric: "2K+ GitHub stars"
  # Optional: dashboard/demo URL with credentials
  # dashboard:
  #   url: "https://janesmith.dev/demo"
  #   password: "demo-2026"

compensation:
  target_range: "$150K-200K"     # Your target total comp
  currency: "USD"
  minimum: "$120K"               # Walk-away number
  location_flexibility: "Remote preferred, 1 week/month on-site possible"

location:
  country: "United States"
  city: "San Francisco"
  timezone: "PST"
  visa_status: "No sponsorship needed"
  # For remote roles outside your country:
  # onsite_availability: "1 week/month in any city"

cv:
  output_format: "html" # "html" (default) or "latex"
  # (Optional) Canva resume design ID for visual CV generation via /career-ops pdf.
  # Find it in your Canva design URL: https://www.canva.com/design/DAxxxxxxx/...
  # The ID starts with "D" and is 11 characters long.
  # canva_resume_design_id: "DAxxxxxxxxx"

# Optional per-skill behavior overrides.
#
# Some skills (notably `contacto`) need broad web search + LinkedIn lookups
# that the web Claude (with Research mode) does much better than Claude Code's
# WebSearch. For those skills, set `default_mode: prompt` and the skill will
# emit a single copy-paste prompt that you paste into a new claude.ai chat
# with Research enabled — instead of trying to execute the workflow inline.
#
# The full description (with override path) lives in modes/_profile.md ->
# "Skill Behavior Defaults". This block exists so the same preference is also
# machine-readable for future tooling.
#
# Per-invocation override: tell the agent "run inline" or "give me the prompt"
# in your message to force one mode for a single invocation.
skill_behavior:
  contacto:
    default_mode: prompt   # prompt (default) | inline
  deep:
    default_mode: prompt   # deep is prompt-generating by design

# Auto-PDF threshold during evaluation (used by `/career-ops pipeline` and
# `bash batch/batch-runner.sh`).
#
# Generating a tailored CV PDF costs ~30-60s per offer (Playwright launch +
# HTML render) and most offers in a scan score 2.x/3.x and never become an
# actual application — so the PDF goes unused. To avoid that waste, the
# evaluation pipeline only auto-generates a PDF when the offer's score is
# >= this threshold.
#
# Default (key absent OR commented out): 5.1 — effectively disabled, since
# the maximum possible score is 5.0. Reports are always written; PDFs are
# only generated when you opt-in.
#
# Set this to a real number (e.g. 4.0) to opt in to auto-PDF for offers at
# or above that score. Fractional thresholds work (e.g. 3.5 — half-point
# scores like 3.5/5 occur in evaluations). Setting to 0 effectively
# disables the gate and generates a PDF for every offer (old behavior).
# Whatever doesn't make the cut can still be produced on demand later
# via `/career-ops pdf {company-slug}`.
# auto_pdf_score_threshold: 4.0

# Deep-research-prompt threshold during evaluation (used by `/career-ops
# pipeline` and `bash batch/batch-runner.sh`).
#
# When an offer's score is >= this threshold, the evaluation embeds a
# ready-to-run "## Deep Research Prompt" section (see modes/deep.md) at the end
# of the report. In the Go dashboard viewer you can then press `y` to copy that
# prompt together with the full evaluation to your clipboard and paste it into
# Perplexity/Claude/ChatGPT for interview-prep research — so the offers worth
# chasing arrive with their research prompt already built.
#
# Default (key absent OR commented out): 3.5 — embed a prompt for any offer
# worth a closer look. Set to 5.1 to effectively disable (max score is 5.0),
# or to 0 to embed one for every report.
# deep_prompt_score_threshold: 3.5
