<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — CV</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  body {
    font-family: 'Helvetica', 'Arial', sans-serif;
    font-size: 10.5pt;
    line-height: 1.45;
    color: #1a1a1a;
    background: #ffffff;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
  }

  /* === HEADER === */
  .header {
    text-align: center;
    margin-bottom: 16px;
  }

  .header-name {
    font-family: 'Helvetica', 'Arial', sans-serif;
    font-size: 28pt;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #000000;
    text-transform: uppercase;
    line-height: 1.1;
    margin-bottom: 4px;
  }

  .header-title {
    font-family: 'Helvetica', 'Arial', sans-serif;
    font-size: 13pt;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #0000FF;
    text-transform: uppercase;
    line-height: 1.2;
    margin-bottom: 10px;
  }

  .contact-line {
    font-size: 10pt;
    line-height: 1.5;
    color: #000000;
  }

  .contact-line a {
    color: #1155cc;
    text-decoration: underline;
  }

  /* === OPENING SUMMARY (no heading) === */
  .summary {
    text-align: justify;
    font-size: 10.5pt;
    line-height: 1.5;
    color: #000000;
    margin-bottom: 18px;
  }

  /* === SECTION HEADINGS === */
  .section {
    margin-bottom: 14px;
  }

  .section-title {
    font-family: 'Georgia', 'Cambria', 'Times New Roman', serif;
    font-size: 12pt;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #434343;
    text-transform: uppercase;
    border-bottom: 1px solid #000000;
    padding-bottom: 3px;
    margin-bottom: 8px;
    break-after: avoid;
    page-break-after: avoid;
  }

  /* === BULLET LISTS WITH BOLD LEAD-INS === */
  .bullet-list {
    list-style: none;
    padding-left: 0;
    margin: 0;
  }

  .bullet-list li {
    position: relative;
    padding-left: 18px;
    margin-bottom: 5px;
    text-align: justify;
    font-size: 10.5pt;
    line-height: 1.5;
  }

  .bullet-list li::before {
    content: "●";
    position: absolute;
    left: 2px;
    top: 0;
    font-size: 8pt;
    color: #1a1a1a;
  }

  .bullet-list li strong {
    font-weight: 700;
    color: #000000;
  }

  /* === EXPERIENCE === */
  .job {
    margin-bottom: 14px;
    page-break-inside: avoid;
  }

  .job-header {
    font-family: 'Georgia', 'Cambria', serif;
    font-weight: 700;
    font-size: 11pt;
    color: #1a1a1a;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 2px;
    border-bottom: 1px dotted #c0c0c0;
    padding-bottom: 2px;
  }

  .job-period {
    font-family: 'Helvetica', 'Arial', sans-serif;
    font-size: 10pt;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    color: #555;
    white-space: nowrap;
  }

  .job-blurb {
    font-size: 10pt;
    line-height: 1.5;
    color: #333;
    margin: 4px 0 6px 0;
    font-style: italic;
  }

  .role-header {
    font-size: 11pt;
    font-weight: 700;
    color: #1a1a1a;
    margin: 8px 0 2px 0;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .role-marker {
    font-size: 9.5pt;
    font-weight: 400;
    color: #777;
    font-style: italic;
  }

  .role-summary {
    font-size: 10.5pt;
    line-height: 1.5;
    color: #1a1a1a;
    margin-bottom: 4px;
    text-align: justify;
  }

  .job .bullet-list {
    margin-top: 2px;
    margin-bottom: 6px;
  }

  /* === EDUCATION === */
  .edu-degree {
    font-weight: 700;
    font-size: 10.5pt;
    color: #1a1a1a;
  }

  .edu-school {
    font-size: 10.5pt;
    color: #1a1a1a;
    margin-top: 2px;
  }

  /* === LINKS NEVER BREAK === */
  a { white-space: nowrap; }

  /* === PRINT === */
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { padding: 0; }
    .role-header { break-after: avoid; page-break-after: avoid; }
    .role-summary { break-before: avoid; page-break-before: avoid; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="header-name">{{NAME}}</div>
    <div class="header-title">{{TARGET_TITLE}}</div>
    <div class="contact-line">{{LOCATION}}</div>
    <div class="contact-line">{{EMAIL}}</div>
    <div class="contact-line"><a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a></div>
  </div>

  <!-- OPENING SUMMARY (no section heading) -->
  <div class="summary">{{SUMMARY_TEXT}}</div>

  <!-- KEY ACHIEVEMENTS -->
  <div class="section" style="page-break-after: always; break-after: page;">
    <div class="section-title">{{SECTION_KEY_ACHIEVEMENTS}}</div>
    <ul class="bullet-list">
      {{KEY_ACHIEVEMENTS}}
    </ul>
  </div>

  <!-- PROFESSIONAL EXPERIENCE -->
  <div class="section">
    <div class="section-title">{{SECTION_EXPERIENCE}}</div>
    {{EXPERIENCE}}
  </div>

  <!-- AREAS OF EXPERTISE -->
  <div class="section">
    <div class="section-title">{{SECTION_EXPERTISE}}</div>
    <ul class="bullet-list">
      {{EXPERTISE}}
    </ul>
  </div>

  <!-- TECHNICAL PROFICIENCIES -->
  <div class="section">
    <div class="section-title">{{SECTION_SKILLS}}</div>
    <ul class="bullet-list">
      {{SKILLS}}
    </ul>
  </div>

  <!-- EDUCATION -->
  <div class="section">
    <div class="section-title">{{SECTION_EDUCATION}}</div>
    {{EDUCATION}}
  </div>

</div>
</body>
</html>
